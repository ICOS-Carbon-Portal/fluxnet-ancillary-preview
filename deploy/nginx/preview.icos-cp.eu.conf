# Reverse proxy for the ICOS ancillary preview (Dash/gunicorn) app.
# Upstream: gunicorn container on the app VM, host-mapped to :8049.
# Public FQDN: preview.icos-cp.eu
#
# Note: the app sets its own Content-Security-Policy (frame-ancestors
# https://*.icos-cp.eu) and strips X-Frame-Options so it can be embedded
# in the Carbon Portal. Do NOT add X-Frame-Options / CSP here — it would
# conflict with what the app emits.

upstream ancillary_preview {
    server 10.10.10.153:8049;
    keepalive 16;
}

# --- HTTP: redirect everything to HTTPS (keep ACME challenge on :80) ---
server {
    listen 80;
    listen [::]:80;
    server_name preview.icos-cp.eu;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name preview.icos-cp.eu;

    # TLS — adjust to your cert source (Let's Encrypt shown; or ICOS wildcard).
    ssl_certificate     /etc/letsencrypt/live/preview.icos-cp.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/preview.icos-cp.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # The app can return a self-contained zipped HTML export.
    client_max_body_size 25m;

    access_log /var/log/nginx/preview.icos-cp.eu.access.log;
    error_log  /var/log/nginx/preview.icos-cp.eu.error.log;

    location / {
        proxy_pass http://ancillary_preview;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # keepalive to the upstream
        proxy_set_header Connection "";

        # first-fetch of a station extracts a CSV from a remote zip; the
        # container's gunicorn timeout is 180s, so give the proxy headroom.
        proxy_connect_timeout 10s;
        proxy_send_timeout    185s;
        proxy_read_timeout    185s;
    }
}
